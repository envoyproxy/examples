name: Docs

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
    - main

concurrency:
  group: >-
    ${{ github.event.inputs.head_ref || github.run_id }}


jobs:
  docs:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
    - uses: envoyproxy/toolshed/actions/bind-mounts@598eacce15ab5f208102a2fd5669292868002701  # v0.4.0
      with:
        mounts: |
          - src: /mnt/docker
            target: /var/lib/docker
            rm: true
            command-pre: sudo systemctl stop docker
            command-post: sudo systemctl start docker
          - src: /mnt/workspace
            target: GITHUB_WORKSPACE
            chown: "runner:runner"
          - src: /mnt/runner-cache
            target: /home/runner/.cache
            chown: "runner:runner"
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        repository: envoyproxy/envoy
        path: envoy
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        path: examples
    - run: |
        export UID
        export GID=$(id -g)

        cat >> ../envoy/WORKSPACE << 'EOF'
        load("@envoy_examples//bazel:env.bzl", "envoy_examples_env")
        envoy_examples_env()
        EOF

        cat > ../envoy/repo.bazelrc << 'EOF'
        common --config=ci
        common --config=rbe
        common --config=bes
        EOF

        docker compose run docs
      working-directory: examples
      env:
        BUILDKIT_PROGRESS: quiet
        COMPOSE_BAKE: true
        DOCKER_BUILDKIT: 1
        GITHUB_TOKEN: ${{ github.token }}
    - name: Docs upload
      uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f  # v6.0.0
      with:
        name: docs
        path: envoy/generated/docs
        retention-days: 30
