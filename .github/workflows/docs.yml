name: Docs

permissions:
  contents: read

on:
  pull_request:
  push:
    branches:
    - main

concurrency:
  group: >-
    ${{ github.event.inputs.head_ref || github.run_id }}


jobs:
  docs:
    permissions:
      contents: read
      packages: read
    runs-on: ubuntu-24.04
    steps:
    - uses: envoyproxy/toolshed/actions/bind-mounts@598eacce15ab5f208102a2fd5669292868002701  # v0.4.0
      with:
        mounts: |
          - src: /mnt/docker
            target: /var/lib/docker
            rm: true
            command-pre: sudo systemctl stop docker
            command-post: sudo systemctl start docker
          - src: /mnt/workspace
            target: GITHUB_WORKSPACE
            chown: "runner:runner"
          - src: /mnt/runner-cache
            target: /home/runner/.cache
            chown: "runner:runner"
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        repository: envoyproxy/envoy
        path: envoy
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      with:
        path: examples
    - name: RBE auth check
      id: rbe
      if: github.event_name == 'pull_request'
      uses: envoyproxy/toolshed/actions/github/container/auth@f3c0acc8c3799305101f5669042b388edfb070c7
      with:
        container: hello-world
    - name: Configure repo Bazel settings
      working-directory: envoy
      env:
        RBE_AUTHORIZED: ${{ steps.rbe.outputs.authorized }}
        EVENT_NAME: ${{ github.event_name }}
      run: |
        {
          echo "common --config=ci"
          if [[ "$EVENT_NAME" != "pull_request" || "$RBE_AUTHORIZED" == "true" ]]; then
            echo "common --config=rbe"
            echo "common --config=bes"
          else
            echo "# RBE/BES disabled: PR token lacks required credentials"
          fi
        } > repo.bazelrc
        cat repo.bazelrc

    - run: |
        export UID
        export GID=$(id -g)

        docker compose run docs
      working-directory: examples
      env:
        BUILDKIT_PROGRESS: quiet
        COMPOSE_BAKE: true
        DOCKER_BUILDKIT: 1
        GITHUB_TOKEN: ${{ github.token }}
    - name: Docs upload
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
      with:
        name: docs
        path: envoy/generated/docs
        retention-days: 30
